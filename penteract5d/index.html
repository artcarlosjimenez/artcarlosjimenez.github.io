<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Penteract · 5D</title>
<link href="https://fonts.googleapis.com/css2?family=Krona+One&family=EB+Garamond:ital,wght@0,300;1,300&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<canvas id="c"></canvas>

<div class="hd">
  <div class="hd-title">Penteract · 5-Cube</div>
  <div class="hd-sub">ℝ⁵ → ℝ²</div>
</div>

<div id="info">
  <div class="info-stat"><span class="info-n">32</span><span class="info-l">Vértices</span></div>
  <div class="info-sep"></div>
  <div class="info-stat"><span class="info-n">80</span><span class="info-l">Aristas</span></div>
  <div class="info-sep"></div>
  <div class="info-stat"><span class="info-n">80</span><span class="info-l">Caras</span></div>
  <div class="info-sep"></div>
  <div class="info-stat"><span class="info-n">40</span><span class="info-l">Celdas</span></div>
  <div class="info-sep"></div>
  <div class="info-stat"><span class="info-n">10</span><span class="info-l">Teseractos</span></div>
</div>

<div id="ctrl">
  <button class="ctrl-btn active" id="btn-auto">Auto</button>
  <button class="ctrl-btn" id="btn-slow">Lento</button>
  <button class="ctrl-btn" id="btn-reset">Reset</button>
</div>

<!-- Indicador de los 10 planos de rotación 5D -->
<div id="planes">
  <div class="plane-row"><div class="plane-dot" id="p-xy"></div><span>X·Y</span></div>
  <div class="plane-row"><div class="plane-dot" id="p-xz"></div><span>X·Z</span></div>
  <div class="plane-row"><div class="plane-dot" id="p-xw"></div><span>X·W</span></div>
  <div class="plane-row"><div class="plane-dot" id="p-xv"></div><span>X·V</span></div>
  <div class="plane-row"><div class="plane-dot" id="p-yz"></div><span>Y·Z</span></div>
  <div class="plane-row"><div class="plane-dot" id="p-yw"></div><span>Y·W</span></div>
  <div class="plane-row"><div class="plane-dot" id="p-yv"></div><span>Y·V</span></div>
  <div class="plane-row"><div class="plane-dot" id="p-zw"></div><span>Z·W</span></div>
  <div class="plane-row"><div class="plane-dot" id="p-zv"></div><span>Z·V</span></div>
  <div class="plane-row"><div class="plane-dot" id="p-wv"></div><span>W·V</span></div>
</div>

<div id="drag-hint">arrastra para rotar</div>
<div id="stk"><div id="sth"></div></div>

<script src="js/script.js"></script>
</body>
</html>
